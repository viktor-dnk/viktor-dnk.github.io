name: Build & Deploy Jekyll + AMP

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install PyYAML
        run: pip3 install pyyaml

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby & Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: true

      - name: Generate AMP pages
        run: python3 scripts/generate_amp.py

      - name: Debug List generated AMP files
        run: |
          echo "=== AMP directory contents ==="
          find _amp -name "*.md" -type f | head -20
          echo "=== Sample frontmatter ==="
          head -10 _amp/toponymy/*.md 2>/dev/null || echo "No AMP files found"

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug  Check _site for AMP output
        run: |
          echo "=== _site/amp contents ==="
          find _site/amp -type f -name "*.html" | head -20 || echo "No AMP HTML found in _site"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
