name: Build and Deploy AMP site
on:
  push:
    branches: ["main"] # или "master"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate AMP copies
        run: |
          # Находим все md файлы и копируем структуру в папку amp
          find . -name "*.md" -not -path "./amp/*" -not -path "./.*" -not -path "./_*" | while read -r f; do
            clean_f="${f#./}"
            new_dir="amp/$(dirname "$clean_f")"
            mkdir -p "$new_dir"
            # Меняем layout на amp
            sed 's/^layout: .*/layout: amp/' "$f" > "amp/$clean_f"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
