name: Prepare AMP files
on: [push]
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate AMP copies
        run: |
          # Ищем все .md файлы, исключая уже созданную папку amp (если она есть)
          find . -name "*.md" -not -path "./amp/*" -not -path "./.*" | while read -r f; do
            # Убираем "./" из начала пути для чистоты
            clean_f="${f#./}"
            
            # Определяем путь к новой папке внутри amp/
            new_dir="amp/$(dirname "$clean_f")"
            
            # Создаем структуру папок
            mkdir -p "$new_dir"
            
            # Меняем layout и сохраняем файл по точно такому же пути, но внутри amp/
            sed 's/^layout: .*/layout: amp/' "$f" > "amp/$clean_f"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: site-source
          path: .
