name: Prepare AMP files
on: [push]
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate AMP copies
        run: |
          mkdir -p amp
          for f in _toponymy/*.md; do
            sed 's/^layout: .*/layout: amp/' "$f" > "amp/${f##*/}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: site-source
          path: .
