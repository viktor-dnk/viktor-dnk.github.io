name: Prepare AMP files
on: [push]
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate AMP copies
        run: |
          # Ищем все .md файлы в нужных директориях
          for f in _toponymy/*.md _mysteries-dolmens/*.md _info/*.md; do
            # Пропускаем, если файлов нет (чтобы цикл не выдал ошибку)
            [ -e "$f" ] || continue
            
            # Определяем путь к новой папке (заменяем только имя файла на путь)
            # Например, для info/aboutme.md создастся папка amp/info/
            new_dir="amp/$(dirname "$f")"
            mkdir -p "$new_dir"
            
            # Обрабатываем файл и сохраняем его с сохранением структуры
            sed 's/^layout: .*/layout: amp/' "$f" > "amp/$f"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: site-source
          path: .